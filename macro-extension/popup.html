<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SpeedText</title>
  <link rel="stylesheet" href="popup.css"/>
</head>

<body>

  <div class="app">
    <header class="header">
    <div class="logo-box">
      <img
        src="icons/logo.svg"
        alt="MacroFlow"
        class="logo-image"
      />
    </div>

      <div>
        <h1>SpeedText</h1>
        <p>Atalhos de texto inteligentes</p>
      </div>
    </header>

    <!-- Abas -->
    <div class="tabs">
      <button id="tab-cadastrar" class="tab-button active">
        + Criar
      </button>

      <button id="tab-visualizar" class="tab-button">
        ☰ Minhas macros
        <span id="macro-count">0</span>
      </button>
    </div>

    <!-- Aba de criação -->
    <div id="cadastrar" class="tab-content active">

      <div id="form-section">

        <div class="field">
          <label>ATALHO</label>
          <div class="shortcut-wrapper">
            <span>\</span>
            <input id="shortcut" placeholder="atalho" autocomplete="off"/>
          </div>
        </div>

        <div class="field">
          <label>NOME</label>
          <input id="name" placeholder="Ex: Assinatura de e-mail"/>
        </div>

        <div class="field">
          <label>CONTEÚDO</label>
          <div class="editor-wrapper">

            <div class="toolbar">
              <button id="bold-btn" class="toolbar-btn"></button>
              <button id="italic-btn" class="toolbar-btn"></button>
              <div class="divider"></div>
              <button id="list-btn" class="toolbar-btn"></button>
            </div>

            <div
              id="rich-editor"
              class="rich-editor"
              contenteditable="true"
              data-placeholder="O conteúdo que será inserido no lugar do atalho..."
            ></div>

          </div>
        </div>

        <div class="actions">
          <button id="add-macro-btn" class="primary-btn">
            + Adicionar macro
          </button>
        </div>

      </div>

      <!-- Aba de Edição -->
      <div id="edit-section" style="display:none">

        <div class="field">
          <label>ATALHO</label>
          <div class="shortcut-wrapper">
            <span>\</span>
            <input id="edit-shortcut" placeholder="atalho"/>
        </div>
        </div>

        <div class="field">
          <label>NOME</label>
          <input id="edit-name"/>
        </div>

        <div class="field">
          <label>CONTEÚDO</label>

          <div class="editor-wrapper">

            <div class="toolbar">
              <button id="edit-bold-btn" class="toolbar-btn"></button>
              <button id="edit-italic-btn" class="toolbar-btn"></button>
              <div class="divider"></div>
              <button id="edit-list-btn" class="toolbar-btn"></button>
            </div>

            <div
              id="edit-rich-editor"
              class="rich-editor"
              contenteditable="true"
            ></div>

          </div>
        </div>

        <div class="actions">
          <button id="update-macro-btn" class="primary-btn">
            Salvar
          </button>

          <button id="cancel-edit-btn" class="secondary-btn">
            Cancelar
          </button>
        </div>

      </div>

    </div>

    <!-- Aba de Visualização de Macros -->
    <div id="visualizar" class="tab-content">

      <div class="search-wrapper">
        <input
          id="search-input"
          class="search-input"
          placeholder="Buscar por nome ou atalho..."
        />
      </div>

      <div id="macros-list"></div>

      <div id="empty-state" class="empty-state">
        <div class="empty-icon">👻</div>

        <h3>Nenhuma macro ainda</h3>

        <p>Crie sua primeira na aba “Criar”.</p>
      </div>

      <div class="bottom-actions">

        <button id="export-btn" class="secondary-btn">
          ⬇ Exportar
        </button>

        <button id="import-btn" class="secondary-btn">
          ⬆ Importar
        </button>

        <input
          type="file"
          id="import-file"
          accept="application/json"
          hidden
        />

      </div>

    </div>

    <!-- Rodapé -->
    <footer class="footer">
      Desenvolvido por <strong>Lara Corsini</strong>
    </footer>

    <!-- Modals -->
    <div id="modal-overlay" class="modal-overlay hidden">
      <div class="modal">

        <div class="modal-header">
          <h3 id="modal-title"></h3>
        </div>

        <div class="modal-body" id="modal-body"></div>

        <div class="modal-actions" id="modal-actions"></div>

      </div>
    </div>

  </div>
  
  <div id="toast-container" class="toast-container"></div>
  <script src="popup.js"></script>
</body>
</html>
