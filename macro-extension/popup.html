<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gerenciador de Macros</title>
  <link rel="stylesheet" href="popup.css">
</head>

<body>
  <div class="card">

    <div class="tabs">
      <button id="tab-cadastrar" class="tab-button active">Cadastrar</button>
      <button id="tab-visualizar" class="tab-button">Visualizar</button>
    </div>

    <div id="cadastrar" class="tab-content active">

      <!-- FORMULÁRIO -->
      <div id="form-section">
        <input id="shortcut" placeholder="Atalho (ex: /endereco)" />
        <input id="name" placeholder="Nome (ex: Endereço Completo)" />

        <div id="rich-editor" class="rich-editor" contenteditable="true"></div>

        <div class="format-buttons">
          <button id="bold-btn">Negrito</button>
          <button id="italic-btn">Itálico</button>
          <button id="list-btn">Lista</button>
        </div>

        <button id="add-macro-btn">Adicionar Macro</button>
      </div>

      <!-- EDIÇÃO -->
      <div id="edit-section" style="display: none;">
        <input id="edit-shortcut" placeholder="Atalho" />
        <input id="edit-name" placeholder="Nome" />

        <div id="edit-rich-editor" class="rich-editor" contenteditable="true"></div>

        <div class="format-buttons">
          <button id="edit-bold-btn">Negrito</button>
          <button id="edit-italic-btn">Itálico</button>
          <button id="edit-list-btn">Lista</button>
        </div>

        <div>
          <button id="update-macro-btn">Salvar</button>
          <button id="cancel-edit-btn" class="outline">Cancelar</button>
        </div>
      </div>

    </div>

    <div id="visualizar" class="tab-content">
      <input id="search-input" class="search-input" placeholder="Buscar macros..." />
      <div id="macros-list"></div>
    </div>

  </div>

  <script src="popup.js"></script>
</body>
</html>
